
<html>
<head>
  <title>AI App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>AI Website & Video Summarizer</h1>
      <p class="subheading">
        Summarize articles and YouTube videos instantly using AI
      </p>
    </div>
  <div class="input-box">
    <input type="text" id="url" placeholder="Paste a website or YouTube link here..." />
  <button onclick="getSummary()">Summarize</button>
  </div>
  <div id="result">
    <p id="empty-state">
      Paste a link above and get a clear, concise summary in seconds ⚡
    </p>
  </div>
  </div>
<script>

async function getSummary() {
  let url = document.getElementById("url").value;
  if(!url) {
  document.getElementById("result").innerHTML = '<p id="empty-state">URL Cannot be Empty!</p>';
return;  
}
url = url.trim();
// only add if protocol missing
if (!/^https?:\/\//i.test(url)) {
  url = "https://" + url;
}

if (!isValidUrl(url)) {
  document.getElementById("result").innerHTML =
    '<p id="empty-state">Please enter a valid website URL (e.g. example.com) ❌</p>';
  return;
}
function isValidUrl(str) {
  try {
    const url = new URL(str);

   
    if (!url.hostname.includes(".")) return false;

    return url.protocol === "http:" || url.protocol === "https:";
  } catch (_) {
    return false;
  }
}
document.getElementById("result").innerHTML = '<div class="loader-container"><div class="loader"></div><span>Generating summary...</span></div>';
try {
  const res = await fetch("https://ai-summarizer-1o0p.onrender.com/summarize", {  //http://127.0.0.1:8000/summarize  // https://ai-summarizer-1o0p.onrender.com/summarize
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url: url })
  });

  const data = await res.json();

  console.log(data);
  document.getElementById("result").innerHTML = marked.parse(data.summary);
} catch (error) {
document.getElementById("result").innerHTML = '<div class="loader-container"><div class="loader"></div><span>Trying to connect to server...</span></div>';
  setTimeout(() => {
    document.getElementById("result").innerHTML = '<p id="empty-state">Server is waking up or deploying...Please try again in 1–2 minutes</p>';
  }, 3000);
}
}
function isValidUrl(str) {
  try {
    new URL(str);
    return true;
  } catch (_) {
    return false;
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
